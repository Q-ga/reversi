<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="リバーシ">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<title>リバーシ</title>
<style>
  /* ダークラグジュアリー（黒×金）。見出しは明朝、本文はサンセリフ。 */
  :root {
    --bg:#0a0a0b; --bg2:#000000;
    --panel:#15130d; --panel2:#1c190f; --line:#3a3320;
    --text:#ece3cf; --muted:#9c9276;
    --gold:#d9b75d; --gold-deep:#b8902f; --gold-bright:#f0d98a; --ink:#1a1305;
    --serif:"Hiragino Mincho ProN","Yu Mincho","YuMincho",serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body { height: 100%; }
  body {
    margin: 0; min-height: 100%;
    background:
      radial-gradient(120% 80% at 50% -10%, #1b1710 0%, transparent 55%),
      radial-gradient(circle at 50% 120%, #14110a 0%, var(--bg) 60%),
      var(--bg2);
    color: var(--text);
    font-family: "Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",sans-serif;
    user-select: none; -webkit-user-select: none;
    display: flex; align-items: center; justify-content: center;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .screen { display: none; width: 100%; max-width: 520px; padding: 18px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; gap: 16px; }

  /* 見出し（明朝・金） */
  h1.logo, h2, .result-card .big, .stat-block h3 { font-family: var(--serif); font-weight: 600; }
  h1.logo { margin: 10px 0 2px; font-size: 42px; letter-spacing: 12px; padding-left: 12px;
    background: linear-gradient(180deg,#f7e6b0 0%,#d9b75d 45%,#a9802a 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 2px 8px rgba(217,183,93,.25)); }
  .subtitle { color: var(--muted); font-size: 12px; letter-spacing:1px; margin-top: 2px; }
  h2 { font-size: 20px; color: var(--gold-bright); letter-spacing:2px; margin:4px; }

  button { font-family: inherit; cursor: pointer; border: none; border-radius: 12px; }
  .btn-primary { background: linear-gradient(180deg,#e8cd7e,#c69a36 60%,#b8902f);
    color: var(--ink); font-weight:800; font-size:17px; letter-spacing:1px; padding:15px 22px; width:100%;
    border:1px solid #f0d98a; box-shadow:0 3px 0 #7d6220, 0 8px 20px rgba(0,0,0,.5); }
  .btn-primary:active { transform: translateY(2px); box-shadow:0 1px 0 #7d6220, 0 4px 12px rgba(0,0,0,.5); }
  .btn-sub { background:#13110b; color: var(--gold-bright); font-weight:700; font-size:15px; padding:13px 18px; width:100%;
    border:1px solid var(--line); }
  .btn-sub:active { background:#1c190f; }
  .btn-row { display:flex; gap:10px; width:100%; }
  .btn-row > button { flex:1; }
  .menu-list { display:flex; flex-direction:column; gap:12px; width:100%; max-width:340px; margin-top:8px; }

  .card { background: linear-gradient(180deg,#15130d,#100e08); border:1px solid var(--line);
    border-radius:16px; padding:16px; width:100%; box-shadow:0 10px 30px rgba(0,0,0,.5); }
  .field { margin-bottom:14px; }
  .field > label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
  .seg { display:flex; gap:8px; flex-wrap:wrap; }
  .seg button { background:#100e08; color:var(--text); padding:10px 14px; font-size:14px; border:1px solid var(--line); }
  .seg button.sel { border-color: var(--gold-bright); color:var(--ink); font-weight:800;
    background: linear-gradient(180deg,#e8cd7e,#b8902f); }
  .toggle { display:flex; gap:8px; align-items:center; font-size:14px; }
  input[type=checkbox]{ accent-color: var(--gold); width:16px; height:16px; }
  input[type=text]{ width:100%; padding:11px; border-radius:10px; border:1px solid var(--line); background:#0c0a06; color:var(--text); font-size:15px; font-family:inherit; }
  input[type=text]:focus{ outline:none; border-color:var(--gold); }

  /* --- 対局画面 --- */
  .panel-player { display:flex; align-items:center; justify-content:space-between; width:100%; max-width:460px;
    background: linear-gradient(180deg,#15130d,#100e08); border-radius:12px; padding:10px 14px;
    border:1px solid var(--line); transition:.25s; }
  .panel-player.flip { transform: rotate(180deg); }
  .panel-player.turn { border-color: var(--gold); box-shadow:0 0 16px rgba(217,183,93,.4); background:#1c190f; }
  .pp-left { display:flex; align-items:center; gap:10px; }
  .pp-name { font-weight:700; font-size:15px; }
  .pp-count { font-size:24px; font-variant-numeric:tabular-nums; font-weight:800; color:var(--gold-bright); }
  .disc-mini{ width:22px;height:22px;border-radius:50%; box-shadow:inset 0 0 0 1px rgba(217,183,93,.35); }
  .disc-mini.black{ background:radial-gradient(circle at 35% 30%,#4a4a4a,#000);}
  .disc-mini.white{ background:radial-gradient(circle at 35% 30%,#fff,#cfcabb);}

  #message{ min-height:20px; font-size:14px; color:var(--gold); letter-spacing:1px; }

  .board-wrap{ position:relative; width:min(92vw,460px); height:min(92vw,460px);
    border-radius:10px; box-shadow:0 16px 44px rgba(0,0,0,.6); }
  #board3d{ position:absolute; inset:0; }

  .controls{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center; }
  .controls button{ background:#13110b; color:var(--gold-bright); font-weight:700; padding:11px 16px; font-size:14px;
    border:1px solid var(--line); border-radius:12px; }
  .sound-row{ display:flex; gap:16px; font-size:13px; color:var(--muted); }

  /* 結果オーバーレイ */
  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,.86); display:none; align-items:center; justify-content:center; z-index:20; padding:20px; }
  .overlay.active{ display:flex; }
  .result-card{ background: linear-gradient(180deg,#171410,#0c0a06); border:1px solid var(--gold-deep);
    border-radius:18px; padding:28px; width:100%; max-width:360px; text-align:center;
    box-shadow:0 0 40px rgba(217,183,93,.18), 0 20px 50px rgba(0,0,0,.6); }
  .result-card .big{ font-size:32px; margin-bottom:8px; color:var(--gold-bright); letter-spacing:2px; }
  .result-card .score{ font-size:18px; color:var(--muted); margin-bottom:22px; font-variant-numeric:tabular-nums; }

  /* 戦績 */
  .stat-block{ background:#13110b; border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:12px; }
  .stat-block h3{ margin:0 0 8px; font-size:16px; color:var(--gold-bright); letter-spacing:1px; }
  .stat-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; text-align:center; }
  .stat-grid .k{ font-size:11px; color:var(--muted); }
  .stat-grid .v{ font-size:18px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--gold-bright); }
  .prof-row{ display:flex; gap:8px; align-items:center; margin-bottom:8px; }
  .prof-row input{ flex:1; }
  .empty-note{ color:var(--muted); font-size:13px; text-align:center; padding:10px; }
</style>
</head>
<body>

  <!-- メニュー -->
  <section id="screen-menu" class="screen active">
    <h1 class="logo">リバーシ</h1>
    <div class="subtitle">2人で対戦・CPU対戦・記録と戦績</div>
    <div class="menu-list">
      <button class="btn-primary" data-mode="2p">2人で対戦</button>
      <button class="btn-primary" data-mode="cpu">CPUと対戦</button>
      <button class="btn-sub" id="go-stats">戦績</button>
      <button class="btn-sub" id="go-profiles">プロフィール</button>
    </div>
  </section>

  <!-- 対局セットアップ -->
  <section id="screen-setup" class="screen">
    <h2 id="setup-title" style="margin:4px">対局の設定</h2>
    <div class="card">
      <div class="field" id="field-black">
        <label>黒（先攻）<span class="disc-mini black" style="display:inline-block;vertical-align:middle;width:16px;height:16px;margin-left:4px"></span></label>
        <div class="seg" id="seg-black"></div>
      </div>
      <div class="field" id="field-white">
        <label>白（後攻）<span class="disc-mini white" style="display:inline-block;vertical-align:middle;width:16px;height:16px;margin-left:4px"></span></label>
        <div class="seg" id="seg-white"></div>
      </div>
      <div class="field" id="field-level" style="display:none">
        <label>CPUの強さ</label>
        <div class="seg" id="seg-level">
          <button data-level="1">かんたん</button>
          <button data-level="2" class="sel">ふつう</button>
          <button data-level="3">つよい</button>
        </div>
      </div>
      <div class="field">
        <label class="toggle"><input type="checkbox" id="opt-hints" checked> 合法手のヒントを表示</label>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-sub" data-back="menu">戻る</button>
      <button class="btn-primary" id="start-game">対局開始</button>
    </div>
  </section>

  <!-- 対局 -->
  <section id="screen-game" class="screen">
    <div class="panel-player" id="panel-top"></div>
    <div id="message">　</div>
    <div class="board-wrap">
      <div id="board3d"></div>
    </div>
    <div class="panel-player" id="panel-bottom"></div>
    <div class="controls">
      <button id="btn-undo">待った</button>
      <button id="btn-restart">最初から</button>
      <button id="btn-quit">メニュー</button>
    </div>
    <div class="sound-row">
      <label class="toggle"><input type="checkbox" id="snd-bgm" checked> BGM</label>
      <label class="toggle"><input type="checkbox" id="snd-sfx" checked> 効果音</label>
    </div>
  </section>

  <!-- 戦績 -->
  <section id="screen-stats" class="screen">
    <h2 style="margin:4px">戦績</h2>
    <div id="stats-body" style="width:100%"></div>
    <div class="btn-row">
      <button class="btn-sub" id="export-csv">CSV書き出し</button>
      <button class="btn-sub" id="export-json">JSON書き出し</button>
    </div>
    <button class="btn-sub" data-back="menu">メニューに戻る</button>
  </section>

  <!-- プロフィール -->
  <section id="screen-profiles" class="screen">
    <h2 style="margin:4px">プロフィール（最大2人）</h2>
    <div class="card" id="profiles-body"></div>
    <button class="btn-sub" data-back="menu">メニューに戻る</button>
  </section>

  <!-- 結果 -->
  <div class="overlay" id="overlay-result">
    <div class="result-card">
      <div class="big" id="result-text">　</div>
      <div class="score" id="result-score">　</div>
      <div class="btn-row" style="flex-direction:column">
        <button class="btn-primary" id="rematch">もう一回</button>
        <button class="btn-sub" id="to-menu">メニューに戻る</button>
      </div>
    </div>
  </div>

  <script type="importmap">
  { "imports": { "three": "./vendor/three.module.js" } }
  </script>
  <script type="module" src="./src/main.js"></script>
  <script>
    // 開発中(localhost)はSWを無効化＋キャッシュ全削除（旧JS/音が残るのを防ぐ）。
    // 本番(GitHub Pages等)でのみSWを登録してオフライン対応する。
    if ("serviceWorker" in navigator) {
      const isDev = ["localhost", "127.0.0.1"].includes(location.hostname);
      if (isDev) {
        navigator.serviceWorker.getRegistrations().then((rs) => rs.forEach((r) => r.unregister()));
        if (window.caches) caches.keys().then((ks) => ks.forEach((k) => caches.delete(k)));
      } else {
        window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
      }
    }
  </script>
</body>
</html>
